name: Build and Deploy DSA Book

on:
  push:
    branches:
      - main

# ---------------------------------------------------------
# ADD THIS: Stops the LeetHub "double-commit" race condition
# ---------------------------------------------------------
concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # ADD THIS: Caches API calls & Docusaurus build files!
      # ---------------------------------------------------------
      - name: Restore API and Build Caches
        uses: actions/cache@v4
        with:
          path: |
            categories_api.json
            .docusaurus
          key: dsa-cache-${{ github.run_id }}
          restore-keys: |
            dsa-cache-

      - name: Setup Python
        uses: actions/setup-python@v4

      - name: Generate Docs
        run: python scripts/generate_docs.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node Modules
        id: node-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install Dependencies
        # Only run 'npm ci' if the cache was NOT found
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci
        
      - name: Build Website
        env:
          CI: true
        run: npm run build

      - name: Deploy to GitHub Pages
        env:
          GIT_USER: ${{ github.actor }}
          GIT_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          npm run deploy
